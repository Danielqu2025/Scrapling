# Public reverse proxy for Shanghai EIA (Ubuntu + Cloudflare).
# Replace YOUR_DOMAIN and certificate paths before use.
#
# Cloudflare SSL/TLS recommendation: Full (strict) with origin certificate
# or a publicly trusted cert on this host.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream sh_eia_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect HTTP -> HTTPS (Cloudflare "Flexible" is discouraged; prefer Full strict)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # Origin certificate (Cloudflare) or Let's Encrypt
    ssl_certificate     /etc/ssl/sh_eia/origin.crt;
    ssl_certificate_key /etc/ssl/sh_eia/origin.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (app also sets some; nginx reinforces at the edge)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 256m;

    location /health {
        proxy_pass http://sh_eia_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://sh_eia_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}
