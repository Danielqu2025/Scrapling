<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上海环评资料检索</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #dbeafe;
      --primary-soft: #eef2ff;
      --border: #e5e7eb;
      --muted: #6b7280;
      --bg: #f4f6f8;
      --text: #1f2937;
      --danger: #dc2626;
      --stage-active: #2563eb;
      --stage-done: #059669;
      --stage-empty: #cbd5e1;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header > div:first-child { flex: 1; min-width: 240px; }
    .brand-title {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }
    .brand-title h1 {
      margin: 0;
      font-size: 2em;
      line-height: 1.2;
    }
    .brand-title p {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      opacity: .92;
    }
    .user-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .user-bar-name { font-size: 14px; opacity: .95; }
    .user-bar-link, .user-bar-btn {
      color: #fff;
      text-decoration: none;
      background: rgba(255,255,255,.16);
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* e2-style: left filters + right results */
    .search-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 960px) { .search-layout { grid-template-columns: 1fr; } }
    .filter-panel { position: sticky; top: 16px; padding: 0; overflow: hidden; }
    .filter-panel-head { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: #fff; padding: 14px 16px; font-weight: 600; }
    .filter-panel-body { padding: 16px; max-height: calc(100vh - 220px); overflow-y: auto; }
    .filter-group { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .filter-group:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
    .filter-group h3 { margin: 0 0 10px; font-size: 14px; color: var(--primary); font-weight: 600; }
    .filter-option { display: flex; align-items: center; gap: 8px; margin: 7px 0; font-size: 14px; cursor: pointer; }
    .filter-option .count { margin-left: auto; color: var(--muted); font-size: 12px; }
    .filter-select { width: 100%; margin-top: 4px; }
    .filter-actions { display: grid; gap: 8px; margin-top: 8px; }
    .filter-actions button { width: 100%; }
    .results-panel { min-height: 480px; }
    .results-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .results-head h2 { margin: 0; font-size: 18px; color: var(--primary); }
    .panel { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input[type=text] { flex: 1; min-width: 240px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; }
    select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; cursor: pointer; background: var(--primary); color: #fff; }
    button:hover { background: var(--primary-hover); }
    button.secondary { background: var(--primary-soft); color: #1e3a8a; }
    button.secondary:hover { background: #e0e7ff; }
    button.linkish { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    button.linkish:hover { background: var(--primary-soft); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    button:disabled:hover { background: var(--primary); }
    button.secondary:disabled:hover { background: var(--primary-soft); }
    .stats, .meta { color: var(--muted); font-size: 14px; }
    .message { margin-top: 10px; color: #1e40af; }
    .error { color: var(--danger); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--primary-light); color: #1e40af; font-size: 12px; margin-right: 8px; }
    .result-card { border-top: 1px solid var(--border); padding: 16px 0; }
    .result-card h3 { margin: 0 0 8px; font-size: 18px; }
    .update-banner { display: none; background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
    .update-banner.show { display: block; }

    /* Progress modal — inspired by e2.sthj.sh.gov.cn timeline */
    .modal-mask { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1000; padding: 24px; overflow: auto; }
    .modal-mask.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: #fff; width: min(1100px, 100%); border-radius: 14px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.18); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); }
    .modal-head h2 { margin: 0; font-size: 20px; }
    .modal-body { display: grid; grid-template-columns: 280px 1fr; min-height: 520px; }

    .stage-rail { background: #f1f5f9; border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; }
    .stage-select {
      display: none;
      width: 100%;
      margin: 0;
      padding: 12px 14px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      appearance: auto;
    }
    .stage-item { position: relative; padding: 14px 16px 14px 22px; cursor: pointer; border-left: 4px solid transparent; transition: .15s; }
    .stage-item:hover { background: #e2e8f0; }
    .stage-item.active { background: #fff; border-left-color: var(--stage-active); box-shadow: inset 0 0 0 1px #dbeafe; }
    .stage-item.completed { border-left-color: var(--stage-done); }
    .stage-item.partial { border-left-color: #f59e0b; }
    .stage-item.empty { opacity: .72; }
    .stage-item .label { font-weight: 600; font-size: 14px; }
    .stage-item .time { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stage-item .dot { position: absolute; left: 8px; top: 18px; width: 8px; height: 8px; border-radius: 50%; background: var(--stage-empty); }
    .stage-item.completed .dot { background: var(--stage-done); }
    .stage-item.active .dot { background: var(--stage-active); }

    .stage-panel { padding: 20px 24px; overflow-y: auto; flex: 1; min-height: 0; -webkit-overflow-scrolling: touch; }
    .stage-panel-wrap { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .stage-panel h3 { margin: 0 0 16px; color: var(--primary); }
    .field-grid { display: grid; gap: 10px; }
    .field-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; font-size: 14px; }
    .field-row-long { grid-template-columns: 1fr; }
    .field-row-long .fname { font-weight: 600; color: #475569; padding-bottom: 4px; }
    .field-row .fvalue { white-space: pre-wrap; word-break: break-word; }
    .field-row-long .fvalue { line-height: 1.65; }
    .field-hint { margin: 6px 0 0; font-size: 12px; }
    .inline-file-names { margin: 0; padding-left: 1.2em; }
    .inline-file-names li { margin: 4px 0; word-break: break-all; }
    .file-list { margin-top: 18px; }
    .file-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .file-item > span { flex: 1; min-width: 0; word-break: break-all; }
    .file-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .captcha-modal .modal { width: min(420px, 100%); }
    .captcha-box { text-align: center; padding: 8px 0 16px; }
    .captcha-box img { max-width: 100%; border: 1px solid var(--border); border-radius: 8px; }
    .captcha-box input { width: 100%; margin-top: 12px; padding: 10px; font-size: 18px; letter-spacing: 4px; text-align: center; border: 1px solid #cbd5e1; border-radius: 8px; }

    html { -webkit-text-size-adjust: 100%; }
    img { max-width: 100%; height: auto; }

    @media (max-width: 960px) {
      header { padding: 12px 16px; }
      header > div:first-child { min-width: 0; }
      .brand-title { flex-direction: column; align-items: flex-start; gap: 4px; }
      .brand-title h1 { font-size: 1.35rem; }
      .brand-title p { font-size: 13px; line-height: 1.45; }
      .user-bar { width: 100%; }
      .user-bar-link, .user-bar-btn { padding: 8px 10px; font-size: 12px; }
      main { padding: 12px; }
      .panel { padding: 14px; border-radius: 10px; }
      .filter-panel { position: static; }
      .filter-panel-body { max-height: none; padding: 14px; }
      .results-panel { min-height: 0; }
      input[type=text] { min-width: 0; width: 100%; }
      .result-card { padding: 14px 0; }
      .result-card h3 { font-size: 16px; line-height: 1.4; }
      .result-card .row button { width: 100%; }
      .badge { margin-bottom: 4px; }
    }

    @media (max-width: 1024px) {
      .modal-mask { padding: 0; align-items: stretch; }
      .modal {
        width: 100%;
        height: 100%;
        min-height: 100%;
        max-height: 100%;
        border-radius: 0;
        display: flex;
        flex-direction: column;
      }
      .modal-head {
        flex-wrap: nowrap;
        gap: 10px;
        padding: 12px 14px;
        position: sticky;
        top: 0;
        z-index: 2;
        align-items: flex-start;
      }
      .modal-head > div:first-child { flex: 1; min-width: 0; }
      .modal-head h2 {
        font-size: 15px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .modal-head .meta {
        font-size: 12px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .modal-head #progressClose {
        flex-shrink: 0;
        padding: 8px 12px;
      }
      .modal-body {
        display: flex;
        flex-direction: column;
        grid-template-columns: none;
        min-height: 0;
        flex: 1;
        overflow: hidden;
      }
      /* 移动端：阶段栏改为顶部横向滚动 pill 条，更贴合窄屏 */
      .stage-rail {
        display: flex;
        flex-direction: row;
        gap: 8px;
        padding: 12px 14px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        background: #f8fafc;
        flex-shrink: 0;
      }
      .stage-select { display: none; }
      .stage-item {
        flex: 0 0 auto;
        padding: 9px 14px 9px 26px;
        border-left: 0;
        border: 1px solid #e2e8f0;
        border-radius: 999px;
        background: #fff;
        transition: .15s;
        white-space: nowrap;
      }
      .stage-item:hover { background: #e2e8f0; }
      .stage-item.active {
        background: var(--stage-active);
        border-color: var(--stage-active);
        box-shadow: none;
      }
      .stage-item.active .label,
      .stage-item.active .time { color: #fff; }
      .stage-item.active .dot { background: #fff; }
      .stage-item.completed { border-color: var(--stage-done); }
      .stage-item.completed .dot { background: var(--stage-done); }
      .stage-item.partial { border-color: #f59e0b; }
      .stage-item.partial .dot { background: #f59e0b; }
      .stage-item.empty { opacity: .72; }
      .stage-item .dot { left: 12px; top: 50%; transform: translateY(-50%); }
      .stage-item .time { margin-top: 2px; }
      .stage-panel-wrap { flex: 1; min-height: 0; }
      .stage-panel { padding: 14px 16px 24px; }
      .stage-panel h3 { font-size: 17px; margin-bottom: 12px; }
      .field-grid { gap: 8px; }
      .field-row {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
      }
      .field-row .fname { font-weight: 600; color: #475569; font-size: 12px; }
      .field-row .fvalue { font-size: 14px; line-height: 1.55; }
      .file-list h4 { margin: 16px 0 10px; font-size: 15px; }
      .file-item {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
        margin-bottom: 8px;
        border-bottom: 1px solid #e2e8f0;
      }
      .file-item > span { font-size: 13px; line-height: 1.45; }
      .file-actions { justify-content: stretch; }
      .file-actions button, .file-item > button {
        width: 100%;
        min-height: 42px;
        font-size: 14px;
      }
      #downloadStatusMessage { padding: 0 16px 16px !important; font-size: 13px; }
      .captcha-modal.modal-mask {
        padding: 12px;
        align-items: center;
        justify-content: center;
      }
      .captcha-modal .modal {
        width: min(420px, 100%);
        height: auto;
        min-height: auto;
        max-height: calc(100% - 24px);
        border-radius: 14px;
        margin: auto;
      }
    }

    @media (max-width: 480px) {
      .brand-title h1 { font-size: 1.2rem; }
      .user-bar { gap: 6px; }
      .results-head h2 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand-title">
      <h1>上海环评资料检索</h1>
      <p>整合投用前公示（受理→拟审批→审批决定）与中后期信息公开，按项目全生命周期展示</p>
    </div>
    <div id="userBar" class="user-bar" hidden></div>
  </header>
  <main>
    <section id="updateBanner" class="update-banner panel">
      <div id="updateBannerText"></div>
      <div class="row" style="margin-top:10px">
        <a id="updateSyncBtn" href="/settings" hidden style="display:none;text-decoration:none;background:var(--primary);color:#fff;padding:10px 16px;border-radius:8px;font-size:14px;">去设置同步</a>
        <button id="updateDismissBtn" class="secondary" hidden>稍后</button>
      </div>
    </section>

    <div class="search-layout">
      <aside class="filter-panel panel">
        <div class="filter-panel-head">筛选条件</div>
        <div class="filter-panel-body">
          <div class="filter-group">
            <h3>关键字</h3>
            <input id="query" type="text" placeholder="项目名称、建设单位、批文号、项目概况…" style="width:100%">
          </div>
          <div class="filter-group">
            <h3>公示类型</h3>
            <div id="typeFilters">
              <label class="filter-option"><input type="checkbox" class="typeBox" value="acceptance" checked> 受理信息</label>
              <label class="filter-option"><input type="checkbox" class="typeBox" value="proposed_approval" checked> 拟审批公示</label>
              <label class="filter-option"><input type="checkbox" class="typeBox" value="approval_decision" checked> 审批决定公告</label>
              <label class="filter-option"><input type="checkbox" class="typeBox" value="post_construction" checked> 中后期信息公开</label>
            </div>
          </div>
          <div class="filter-group">
            <h3>所属区域</h3>
            <select id="districtFilter" class="filter-select">
              <option value="">全部区域</option>
            </select>
          </div>
          <div class="filter-group">
            <h3>排序</h3>
            <select id="sortBy" class="filter-select">
              <option value="event_date">按公示日期</option>
              <option value="synced_at">按同步时间</option>
              <option value="project_name">按项目名称</option>
              <option value="type">按公示类型</option>
            </select>
            <select id="sortOrder" class="filter-select" style="margin-top:8px">
              <option value="desc">降序（新→旧）</option>
              <option value="asc">升序（旧→新）</option>
            </select>
          </div>
          <div class="filter-actions">
            <button id="searchBtn">查询</button>
            <button id="resetFiltersBtn" class="secondary">重置条件</button>
          </div>
        </div>
      </aside>

      <section class="results-panel panel">
        <div class="results-head">
          <div>
            <h2>查询结果</h2>
            <div id="stats" class="stats" style="margin-top:6px"></div>
          </div>
          <div id="resultCount" class="meta"></div>
        </div>
        <div id="results"></div>
      </section>
    </div>
  </main>

  <!-- 项目进展（e2 风格时间轴） -->
  <div id="progressModal" class="modal-mask">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 id="progressTitle">项目进展</h2>
          <div id="progressMeta" class="meta"></div>
        </div>
        <button id="progressClose" class="secondary">关闭</button>
      </div>
      <div class="modal-body">
        <div id="stageRail" class="stage-rail"></div>
        <select id="stageSelect" class="stage-select" aria-label="选择项目阶段"></select>
        <div class="stage-panel-wrap">
          <div id="stagePanel" class="stage-panel"></div>
          <div id="downloadStatusMessage" class="meta" style="padding:0 24px 16px;color:#1e40af"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 验证码下载 -->
  <div id="captchaModal" class="modal-mask captcha-modal">
    <div class="modal">
      <div class="modal-head">
        <h2 style="margin:0;font-size:18px">输入官网验证码</h2>
        <button id="captchaClose" class="secondary">关闭</button>
      </div>
      <div style="padding:20px">
        <div id="captchaFileName" class="meta"></div>
        <div class="captcha-box">
          <img id="captchaImg" alt="验证码">
          <input id="captchaInput" type="text" maxlength="6" placeholder="请输入验证码（区分大小写）" autocomplete="off" style="text-transform:uppercase">
        </div>
        <div class="row">
          <button id="captchaRefresh" class="secondary">换一张</button>
          <button id="captchaSubmit" style="flex:1">确认下载</button>
        </div>
        <div id="captchaMessage" class="message"></div>
      </div>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/app.js"></script>
  <script>
    const authFetch = (...args) => window.ShEiaAuth.authFetch(...args);
    const apiErrorMessage = (...args) => window.ShEiaAuth.apiErrorMessage(...args);
    const filenameFromDisposition = (...args) => window.ShEiaAuth.filenameFromDisposition(...args);
    const saveBlobDownload = (...args) => window.ShEiaAuth.saveBlobDownload(...args);

    let progressData = null;
    let activeStageKey = null;
    let captchaState = { fileId: null, sessionId: null };

    function selectedTypes() {
      return [...document.querySelectorAll(".typeBox:checked")].map(el => el.value);
    }

    function filterParams() {
      const params = new URLSearchParams();
      const q = document.getElementById("query").value.trim();
      if (q) params.set("q", q);
      selectedTypes().forEach(t => params.append("types", t));
      const district = document.getElementById("districtFilter").value;
      if (district) params.set("district", district);
      params.set("sort_by", document.getElementById("sortBy").value);
      params.set("sort_order", document.getElementById("sortOrder").value);
      params.set("limit", "80");
      return params;
    }

    function fillSelect(selectId, items, allLabel) {
      const select = document.getElementById(selectId);
      const current = select.value;
      select.innerHTML = `<option value="">${allLabel}</option>`;
      for (const item of items || []) {
        const opt = document.createElement("option");
        opt.value = item.value;
        opt.textContent = `${item.label || item.value} (${item.count})`;
        select.appendChild(opt);
      }
      if ([...select.options].some(o => o.value === current)) select.value = current;
    }

    async function loadFacets() {
      const params = new URLSearchParams();
      selectedTypes().forEach(t => params.append("types", t));
      const data = await (await authFetch(`/api/search/facets?${params}`)).json();
      fillSelect("districtFilter", data.districts, "全部区域");
    }

    function resetFilters() {
      document.getElementById("query").value = "";
      document.querySelectorAll(".typeBox").forEach(el => { el.checked = true; });
      document.getElementById("districtFilter").value = "";
      document.getElementById("sortBy").value = "event_date";
      document.getElementById("sortOrder").value = "desc";
      loadFacets().then(search);
    }

    async function loadStats() {
      const data = await (await authFetch("/api/stats")).json();
      const latest = data.latest_sync;
      const latestText = latest ? `最近同步：${latest.status} — ${latest.message || ""}` : "尚未同步";
      document.getElementById("stats").textContent =
        `项目 ${data.total_masters ?? 0} 个，事件 ${data.total_events ?? 0} 条，文件 ${data.total_files ?? 0} 个。${latestText}`;
    }

    async function search() {
      const data = await (await authFetch(`/api/search?${filterParams()}`, { cache: "no-store" })).json();

      const byCard = new Map();
      function preferCard(next, current) {
        if (!current) return true;
        if (next.disclosure_type === "approval_decision") return true;
        if (current.disclosure_type === "approval_decision") return false;
        if (next.disclosure_type === "proposed_approval" && current.disclosure_type !== "proposed_approval") return true;
        if (current.disclosure_type === "proposed_approval" && next.disclosure_type !== "proposed_approval") return false;
        const nextName = (next.display_name || "").length;
        const currentName = (current.display_name || "").length;
        if (nextName > currentName) return true;
        return false;
      }
      for (const item of data.results || []) {
        const cluster = item.search_cluster_key || String(item.master_id);
        const episode = item.episode_key || item.event_approval_number || "";
        const cardKey = `${cluster}:${episode}`;
        const current = byCard.get(cardKey);
        if (preferCard(item, current)) byCard.set(cardKey, item);
      }
      const cards = [...byCard.values()];
      document.getElementById("resultCount").textContent = `共 ${cards.length} 条项目记录（${(data.results || []).length} 条匹配事件）`;
      renderResults(cards);
    }

    function renderResults(items) {
      const container = document.getElementById("results");
      container.innerHTML = "";
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "result-card";
        div.innerHTML = `
          <h3>${item.display_name || item.title || item.project_name}</h3>
          <div class="meta">
            <span class="badge">${item.disclosure_label || ""}</span>
            ${item.episode_label && !String(item.episode_label).startsWith("round_") ? "环评轮次：" + item.episode_label + "；" : (item.episode_key && String(item.episode_key).startsWith("round_") ? "年份：" + item.episode_key.replace("round_", "") + "；" : "")}
            ${item.company ? "建设单位：" + item.company + "；" : ""}
            ${item.district ? "区域：" + item.district + "；" : ""}
            ${item.lifecycle_stage ? "阶段：" + item.lifecycle_stage + "；" : ""}
            ${item.event_date ? "日期：" + String(item.event_date).slice(0, 10) + "；" : ""}
          </div>
          <div class="row" style="margin:12px 0">
            <button class="progressBtn" data-master="${item.master_id}" data-episode="${encodeURIComponent(item.episode_key || "")}">查看项目进展（全生命周期）</button>
          </div>
          <div class="meta">附件按阶段归类，请在全生命周期视图中查看与下载</div>`;
        container.appendChild(div);
      });

      container.querySelectorAll(".progressBtn").forEach(btn => {
        btn.addEventListener("click", () => openProgress(Number(btn.dataset.master), decodeURIComponent(btn.dataset.episode || "")));
      });
    }

    async function openProgress(masterId, episodeKey = "") {
      const params = episodeKey ? `?episode=${encodeURIComponent(episodeKey)}` : "";
      const res = await authFetch(`/api/master/${masterId}/progress${params}`);
      if (!res.ok) { alert("无法加载项目进展"); return; }
      progressData = await res.json();
      setDownloadStatus("");
      const master = progressData.master;
      document.getElementById("progressTitle").textContent = master.canonical_name || "项目进展";
      document.getElementById("progressMeta").textContent =
        [master.company, master.approval_number, master.location].filter(Boolean).join(" · ");
      const first = progressData.stages.find(s => s.key === "basic_info" && s.status !== "empty")
        || progressData.stages.find(s => s.status !== "empty")
        || progressData.stages[0];
      activeStageKey = first.key;
      renderStageRail();
      renderStagePanel(activeStageKey);
      document.getElementById("progressModal").classList.add("show");
    }

    function renderStageRail() {
      const rail = document.getElementById("stageRail");
      const select = document.getElementById("stageSelect");
      rail.innerHTML = progressData.stages.map(stage => `
        <div class="stage-item ${stage.key === activeStageKey ? "active" : ""} ${stage.status}" data-key="${stage.key}">
          <span class="dot"></span>
          <div class="label">${stage.label}</div>
          <div class="time">${stage.date || (stage.status === "empty" ? "暂无数据" : "")}</div>
        </div>`).join("");
      rail.querySelectorAll(".stage-item").forEach(el => {
        el.addEventListener("click", () => {
          activeStageKey = el.dataset.key;
          renderStageRail();
          renderStagePanel(activeStageKey);
        });
      });
      select.innerHTML = progressData.stages.map(stage => {
        const mark = stage.status === "empty" ? "（暂无）" : (stage.date ? ` · ${stage.date}` : "");
        return `<option value="${stage.key}" ${stage.key === activeStageKey ? "selected" : ""}>${stage.label}${mark}</option>`;
      }).join("");
    }

    const LONG_FIELD_LABELS = new Set(["项目概况", "项目基本信息"]);

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function isDownloadListField(label, value) {
      const text = String(value || "");
      if (!/下载/.test(text) || !/\.pdf/i.test(text)) return false;
      return /(报告|意见|附件|说明|措施|文件)/.test(label || "") || (text.match(/\.pdf/gi) || []).length >= 2;
    }

    function formatFieldValue(label, value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (isDownloadListField(label, text)) {
        const parts = text
          .split(/\s*下载\s*/)
          .map((part) => part.trim())
          .filter(Boolean);
        if (parts.length > 1) {
          return (
            `<ul class="inline-file-names">${parts.map((part) => `<li>${escapeHtml(part)}</li>`).join("")}</ul>` +
            `<p class="meta field-hint">正式下载请使用下方「附件」按钮</p>`
          );
        }
      }
      return escapeHtml(text);
    }

    function renderStagePanel(key) {
      const stage = progressData.stages.find(s => s.key === key);
      const panel = document.getElementById("stagePanel");
      if (!stage) return;
      const hasFiles = (stage.files || []).length > 0;
      const fields = (stage.fields || [])
        .filter((f) => !(hasFiles && isDownloadListField(f.label, f.value)))
        .map((f) => {
          const longField = LONG_FIELD_LABELS.has(f.label) || isDownloadListField(f.label, f.value);
          return `<div class="field-row${longField ? " field-row-long" : ""}"><div class="fname">${escapeHtml(f.label)}</div><div class="fvalue">${formatFieldValue(f.label, f.value)}</div></div>`;
        })
        .join("");
      const files = (stage.files || []).map(f => `
        <div class="file-item">
          <span><strong>[${escapeHtml(f.file_type_label || f.file_type)}]</strong> ${escapeHtml(f.file_name || f.file_url || "")}</span>
          <div class="file-actions">
            ${f.download_status === "captcha_required"
              ? `<button class="linkish captchaBtn" data-file-id="${f.id}">验证码下载</button>`
              : `<button type="button" class="linkish singleDownloadBtn" data-file-id="${f.id}">下载</button>`}
          </div>
        </div>`).join("");
      panel.innerHTML = `
        <h3>${escapeHtml(stage.label)}</h3>
        <div class="field-grid">${fields || "<div class='meta'>暂无字段</div>"}</div>
        ${stage.source_url ? `<p class="meta" style="margin-top:12px"><a href="${escapeHtml(stage.source_url)}" target="_blank" rel="noopener">查看官网来源</a></p>` : ""}
        <div class="file-list">${files ? "<h4 style='margin:18px 0 8px'>附件</h4>" + files : ""}</div>`;
      panel.querySelectorAll(".captchaBtn").forEach(btn => {
        btn.addEventListener("click", () => openCaptcha(Number(btn.dataset.fileId)));
      });
      panel.querySelectorAll(".singleDownloadBtn").forEach(btn => {
        btn.addEventListener("click", () => downloadSingleFile(Number(btn.dataset.fileId), btn));
      });
      panel.scrollTop = 0;
    }

    function setDownloadStatus(message, isError = false) {
      const el = document.getElementById("downloadStatusMessage");
      el.textContent = message || "";
      el.style.color = isError ? "#dc2626" : "#1e40af";
    }

    function triggerNativeDownload(url) {
      window.ShEiaAuth.downloadWithAuth(url, "download.bin").catch((err) => {
        setDownloadStatus(err.message || "下载失败", true);
        alert(err.message || "下载失败");
      });
    }

    async function triggerBrowserDownload(res, fallbackName) {
      if (!res.ok) {
        let message = "下载失败";
        try {
          const data = await res.json();
          message = apiErrorMessage(data, message);
        } catch (_) {}
        setDownloadStatus(message, true);
        alert(message);
        return false;
      }
      const blob = await res.blob();
      const filename = filenameFromDisposition(res.headers.get("Content-Disposition")) || fallbackName;
      saveBlobDownload(blob, filename);
      return true;
    }

    function downloadSingleFile(fileId, buttonEl) {
      // Cookie 鉴权的浏览器原生下载：大 PDF（十余 MB）走 fetch+blob 易长时间无响应后变成 Failed to fetch
      setDownloadStatus("正在下载（首次需从官网拉取，环评报告可能较大，请查看浏览器下载栏）…");
      const a = document.createElement("a");
      a.href = `/api/download/file/${fileId}`;
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      a.remove();
      if (buttonEl) {
        const oldText = buttonEl.textContent;
        buttonEl.disabled = true;
        buttonEl.textContent = "下载中…";
        setTimeout(() => {
          buttonEl.disabled = false;
          buttonEl.textContent = oldText;
          setDownloadStatus("若下载栏未出现文件，请检查是否已登录，或稍后重试。");
        }, 8000);
      }
    }

    async function openCaptcha(fileId) {
      captchaState = { fileId, sessionId: null, loading: true };
      document.getElementById("captchaSubmit").disabled = true;
      document.getElementById("captchaRefresh").disabled = true;
      document.getElementById("captchaMessage").textContent = "正在获取验证码…";
      document.getElementById("captchaInput").value = "";
      document.getElementById("captchaModal").classList.add("show");
      try {
        const res = await authFetch("/api/download/e2/captcha", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file_id: fileId }),
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById("captchaMessage").innerHTML = `<span class="error">${apiErrorMessage(data, "获取验证码失败")}</span>`;
          return;
        }
        applyCaptchaPayload(data);
        document.getElementById("captchaMessage").textContent = "请输入图中验证码（区分大小写）";
      } finally {
        captchaState.loading = false;
        document.getElementById("captchaSubmit").disabled = false;
        document.getElementById("captchaRefresh").disabled = false;
      }
    }

    function applyCaptchaPayload(data) {
      captchaState.sessionId = data.session_id;
      document.getElementById("captchaFileName").textContent = `${data.project_name} — ${data.file_name}`;
      document.getElementById("captchaImg").src = `data:${data.content_type};base64,${data.captcha_base64}`;
      document.getElementById("captchaInput").value = "";
    }

    async function submitCaptcha() {
      const captcha = document.getElementById("captchaInput").value.trim();
      if (!captcha || captchaState.loading) return;
      if (!captchaState.sessionId) {
        await openCaptcha(captchaState.fileId);
        document.getElementById("captchaMessage").innerHTML = `<span class="error">会话未就绪，已重新获取验证码，请重新输入。</span>`;
        return;
      }
      document.getElementById("captchaSubmit").disabled = true;
      document.getElementById("captchaMessage").textContent = "正在下载…";
      const res = await authFetch("/api/download/e2/file", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          file_id: captchaState.fileId,
          session_id: captchaState.sessionId,
          captcha,
        }),
      });
      document.getElementById("captchaSubmit").disabled = false;
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        const msg = apiErrorMessage(data);
        document.getElementById("captchaMessage").innerHTML = `<span class="error">${msg}</span>`;
        if (/验证码|过期|换一张|未返回有效文件/.test(msg)) {
          const refreshed = await refreshCaptchaImage(true);
          if (!refreshed && /过期|会话/.test(msg)) {
            await openCaptcha(captchaState.fileId);
          }
        }
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const disp = res.headers.get("Content-Disposition") || "";
      const a = document.createElement("a");
      a.href = url;
      a.download = filenameFromDisposition(disp) || "e2_attachment.pdf";
      a.click();
      URL.revokeObjectURL(url);
      document.getElementById("captchaMessage").textContent = "下载成功";
      setTimeout(() => document.getElementById("captchaModal").classList.remove("show"), 800);
    }

    async function refreshCaptchaImage(silent = false) {
      if (!captchaState.sessionId) {
        if (!silent) {
          document.getElementById("captchaMessage").innerHTML = `<span class="error">会话不存在，正在重新获取验证码…</span>`;
        }
        if (captchaState.fileId) {
          await openCaptcha(captchaState.fileId);
        }
        return false;
      }
      if (!silent) {
        document.getElementById("captchaMessage").textContent = "正在刷新验证码…";
      }
      document.getElementById("captchaRefresh").disabled = true;
      try {
        const res = await authFetch(`/api/download/e2/refresh?session_id=${encodeURIComponent(captchaState.sessionId)}`, { method: "POST" });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = apiErrorMessage(data, "刷新验证码失败");
          if (/过期|会话/.test(msg) && captchaState.fileId) {
            if (!silent) {
              document.getElementById("captchaMessage").innerHTML = `<span class="error">${msg}，正在重新获取…</span>`;
            }
            await openCaptcha(captchaState.fileId);
            return true;
          }
          if (!silent) {
            document.getElementById("captchaMessage").innerHTML = `<span class="error">${msg}</span>`;
          }
          return false;
        }
        applyCaptchaPayload(data);
        if (!silent) {
          document.getElementById("captchaMessage").textContent = "已刷新，请输入新验证码";
        }
        return true;
      } finally {
        document.getElementById("captchaRefresh").disabled = false;
      }
    }

    document.getElementById("searchBtn").addEventListener("click", search);
    document.getElementById("resetFiltersBtn").addEventListener("click", resetFilters);
    document.getElementById("query").addEventListener("keydown", e => { if (e.key === "Enter") search(); });
    document.querySelectorAll(".typeBox").forEach(b => b.addEventListener("change", () => loadFacets().then(search)));
    ["districtFilter", "sortBy", "sortOrder"].forEach(id => {
      document.getElementById(id).addEventListener("change", search);
    });
    document.getElementById("progressClose").addEventListener("click", () => document.getElementById("progressModal").classList.remove("show"));
    document.getElementById("stageSelect").addEventListener("change", (e) => {
      activeStageKey = e.target.value;
      renderStageRail();
      renderStagePanel(activeStageKey);
    });
    document.getElementById("captchaClose").addEventListener("click", () => document.getElementById("captchaModal").classList.remove("show"));
    document.getElementById("captchaSubmit").addEventListener("click", submitCaptcha);
    document.getElementById("captchaRefresh").addEventListener("click", refreshCaptchaImage);
    document.getElementById("captchaInput").addEventListener("keydown", e => { if (e.key === "Enter") submitCaptcha(); });

    let appBooted = false;
    async function bootApp() {
      if (appBooted) return;
      appBooted = true;
      await loadStats();
      await loadFacets().then(search);
    }

    document.addEventListener("sh-eia-auth-ready", () => {
      bootApp();
    });
  </script>
</body>
</html>
