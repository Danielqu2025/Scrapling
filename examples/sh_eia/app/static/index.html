<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上海环评资料检索</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      --primary: #0b5f7a;
      --primary-light: #e0f2fe;
      --border: #dbe3ee;
      --muted: #64748b;
      --bg: #f4f7fb;
      --stage-active: #0b5f7a;
      --stage-done: #059669;
      --stage-empty: #cbd5e1;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: #1f2937; }
    header { background: var(--primary); color: #fff; padding: 20px 24px; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .panel { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input[type=text] { flex: 1; min-width: 240px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
    select { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; cursor: pointer; background: var(--primary); color: #fff; }
    button.secondary { background: #64748b; }
    button.linkish { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .stats, .meta { color: var(--muted); font-size: 14px; }
    .message { margin-top: 10px; color: #0369a1; }
    .error { color: #b91c1c; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--primary-light); color: #075985; font-size: 12px; margin-right: 8px; }
    .result-card { border-top: 1px solid var(--border); padding: 16px 0; }
    .result-card h3 { margin: 0 0 8px; font-size: 18px; }
    .update-banner { display: none; background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
    .update-banner.show { display: block; }

    /* Progress modal — inspired by e2.sthj.sh.gov.cn timeline */
    .modal-mask { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1000; padding: 24px; overflow: auto; }
    .modal-mask.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: #fff; width: min(1100px, 100%); border-radius: 14px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.18); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); }
    .modal-head h2 { margin: 0; font-size: 20px; }
    .modal-body { display: grid; grid-template-columns: 280px 1fr; min-height: 520px; }
    @media (max-width: 860px) { .modal-body { grid-template-columns: 1fr; } }

    .stage-rail { background: #f1f5f9; border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; }
    .stage-item { position: relative; padding: 14px 16px 14px 22px; cursor: pointer; border-left: 4px solid transparent; transition: .15s; }
    .stage-item:hover { background: #e2e8f0; }
    .stage-item.active { background: #fff; border-left-color: var(--stage-active); box-shadow: inset 0 0 0 1px #dbeafe; }
    .stage-item.completed { border-left-color: var(--stage-done); }
    .stage-item.partial { border-left-color: #f59e0b; }
    .stage-item.empty { opacity: .72; }
    .stage-item .label { font-weight: 600; font-size: 14px; }
    .stage-item .time { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stage-item .dot { position: absolute; left: 8px; top: 18px; width: 8px; height: 8px; border-radius: 50%; background: var(--stage-empty); }
    .stage-item.completed .dot { background: var(--stage-done); }
    .stage-item.active .dot { background: var(--stage-active); }

    .stage-panel { padding: 20px 24px; overflow-y: auto; }
    .stage-panel h3 { margin: 0 0 16px; color: var(--primary); }
    .field-grid { display: grid; gap: 10px; }
    .field-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; font-size: 14px; }
    .field-row .fname { color: var(--muted); }
    .file-list { margin-top: 18px; }
    .file-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .file-item label { display: flex; align-items: center; gap: 8px; flex: 1; }

    .captcha-modal .modal { width: min(420px, 100%); }
    .captcha-box { text-align: center; padding: 8px 0 16px; }
    .captcha-box img { max-width: 100%; border: 1px solid var(--border); border-radius: 8px; }
    .captcha-box input { width: 100%; margin-top: 12px; padding: 10px; font-size: 18px; letter-spacing: 4px; text-align: center; border: 1px solid #cbd5e1; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>上海环评资料检索</h1>
    <p>整合投用前公示（受理→拟审批→审批决定）与中后期信息公开，按项目全生命周期展示</p>
  </header>
  <main>
    <section id="updateBanner" class="update-banner panel">
      <div id="updateBannerText"></div>
      <div class="row" style="margin-top:10px">
        <button id="updateSyncBtn" hidden>立即同步</button>
        <button id="updateDismissBtn" class="secondary" hidden>稍后</button>
      </div>
    </section>

    <section class="panel">
      <div class="row">
        <input id="query" type="text" placeholder="项目名称、建设单位、批文号…">
        <button id="searchBtn">搜索</button>
      </div>
      <div class="row" style="margin-top:12px">
        <label><input type="checkbox" class="typeBox" value="acceptance" checked> 受理</label>
        <label><input type="checkbox" class="typeBox" value="proposed_approval" checked> 拟审批</label>
        <label><input type="checkbox" class="typeBox" value="approval_decision" checked> 审批决定</label>
        <label><input type="checkbox" class="typeBox" value="post_construction" checked> 中后期</label>
      </div>
      <div id="stats" class="stats" style="margin-top:12px"></div>
    </section>

    <section class="panel">
      <div class="row">
        <button id="syncQuickBtn">手动同步（每类 1 页）</button>
        <button id="syncE2Btn" class="secondary">仅同步中后期（1 页）</button>
        <button id="syncFullBtn" class="secondary">全量同步</button>
        <button id="refreshStatusBtn" class="secondary">刷新状态</button>
      </div>
      <div id="syncMessage" class="message"></div>
    </section>

    <section class="panel">
      <div class="row">
        <button id="exportDbBtn" class="secondary">导出数据库</button>
        <button id="exportManifestBtn" class="secondary">导出数据清单</button>
        <label class="secondary" style="cursor:pointer;padding:10px 16px;border-radius:8px;background:#64748b;color:#fff;">
          导入数据库<input id="importDbInput" type="file" accept=".zip,.db" hidden>
        </label>
        <button id="downloadBtn" disabled>下载弹窗内选中的直链文件 (ZIP)</button>
      </div>
      <div id="dbMessage" class="message"></div>
      <div id="resultCount" class="meta" style="margin-top:8px"></div>
      <div id="results"></div>
    </section>
  </main>

  <!-- 项目进展（e2 风格时间轴） -->
  <div id="progressModal" class="modal-mask">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 id="progressTitle">项目进展</h2>
          <div id="progressMeta" class="meta"></div>
        </div>
        <button id="progressClose" class="secondary">关闭</button>
      </div>
      <div class="modal-body">
        <div id="stageRail" class="stage-rail"></div>
        <div id="stagePanel" class="stage-panel"></div>
      </div>
    </div>
  </div>

  <!-- 验证码下载 -->
  <div id="captchaModal" class="modal-mask captcha-modal">
    <div class="modal">
      <div class="modal-head">
        <h2 style="margin:0;font-size:18px">输入官网验证码</h2>
        <button id="captchaClose" class="secondary">关闭</button>
      </div>
      <div style="padding:20px">
        <div id="captchaFileName" class="meta"></div>
        <div class="captcha-box">
          <img id="captchaImg" alt="验证码">
          <input id="captchaInput" type="text" maxlength="6" placeholder="请输入验证码" autocomplete="off">
        </div>
        <div class="row">
          <button id="captchaRefresh" class="secondary">换一张</button>
          <button id="captchaSubmit" style="flex:1">确认下载</button>
        </div>
        <div id="captchaMessage" class="message"></div>
      </div>
    </div>
  </div>

  <script>
    const selectedFileIds = new Set();
    let progressData = null;
    let activeStageKey = null;
    let captchaState = { fileId: null, sessionId: null };

    function selectedTypes() {
      return [...document.querySelectorAll(".typeBox:checked")].map(el => el.value);
    }

    async function loadStats() {
      const data = await (await fetch("/api/stats")).json();
      const latest = data.latest_sync;
      const latestText = latest ? `最近同步：${latest.status} — ${latest.message || ""}` : "尚未同步";
      document.getElementById("stats").textContent =
        `项目 ${data.total_masters ?? 0} 个，事件 ${data.total_events ?? 0} 条，文件 ${data.total_files ?? 0} 个。${latestText}`;
    }

    async function refreshSyncStatus() {
      const data = await (await fetch("/api/sync/status")).json();
      const msg = data.running ? (data.latest?.message || "同步进行中…") : (data.latest ? `${data.latest.status} — ${data.latest.message}` : "暂无同步记录");
      document.getElementById("syncMessage").textContent = msg;
      return data;
    }

    async function search() {
      const params = new URLSearchParams();
      const q = document.getElementById("query").value.trim();
      if (q) params.set("q", q);
      selectedTypes().forEach(t => params.append("types", t));
      params.set("limit", "80");
      const data = await (await fetch(`/api/search?${params}`, { cache: "no-store" })).json();

      const byMaster = new Map();
      for (const item of data.results || []) {
        const id = item.master_id || item.id;
        if (!byMaster.has(id)) byMaster.set(id, item);
      }
      const cards = [...byMaster.values()];
      document.getElementById("resultCount").textContent = `共 ${cards.length} 个项目（${(data.results || []).length} 条匹配事件）`;
      renderResults(cards);
    }

    function renderResults(items) {
      selectedFileIds.clear();
      document.getElementById("downloadBtn").disabled = true;
      const container = document.getElementById("results");
      container.innerHTML = "";
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "result-card";
        div.innerHTML = `
          <h3>${item.project_name}</h3>
          <div class="meta">
            <span class="badge">${item.disclosure_label || ""}</span>
            ${item.company ? "建设单位：" + item.company + "；" : ""}
            ${item.approval_number ? "批文号：" + item.approval_number + "；" : ""}
            ${item.lifecycle_stage ? "阶段：" + item.lifecycle_stage + "；" : ""}
          </div>
          <div class="row" style="margin:12px 0">
            <button class="progressBtn" data-master="${item.master_id}">查看项目进展（全生命周期）</button>
          </div>
          <div class="meta">附件按阶段归类，请在全生命周期视图中查看与下载</div>`;
        container.appendChild(div);
      });

      container.querySelectorAll(".progressBtn").forEach(btn => {
        btn.addEventListener("click", () => openProgress(Number(btn.dataset.master)));
      });
    }

    async function openProgress(masterId) {
      const res = await fetch(`/api/master/${masterId}/progress`);
      if (!res.ok) { alert("无法加载项目进展"); return; }
      progressData = await res.json();
      const master = progressData.master;
      document.getElementById("progressTitle").textContent = master.canonical_name || "项目进展";
      document.getElementById("progressMeta").textContent =
        [master.company, master.approval_number, master.location].filter(Boolean).join(" · ");
      const first = progressData.stages.find(s => s.key === "basic_info" && s.status !== "empty")
        || progressData.stages.find(s => s.status !== "empty")
        || progressData.stages[0];
      activeStageKey = first.key;
      renderStageRail();
      renderStagePanel(activeStageKey);
      document.getElementById("progressModal").classList.add("show");
    }

    function renderStageRail() {
      const rail = document.getElementById("stageRail");
      rail.innerHTML = progressData.stages.map(stage => `
        <div class="stage-item ${stage.key === activeStageKey ? "active" : ""} ${stage.status}" data-key="${stage.key}">
          <span class="dot"></span>
          <div class="label">${stage.label}</div>
          <div class="time">${stage.date || (stage.status === "empty" ? "暂无数据" : "")}</div>
        </div>`).join("");
      rail.querySelectorAll(".stage-item").forEach(el => {
        el.addEventListener("click", () => {
          activeStageKey = el.dataset.key;
          renderStageRail();
          renderStagePanel(activeStageKey);
        });
      });
    }

    function renderStagePanel(key) {
      const stage = progressData.stages.find(s => s.key === key);
      const panel = document.getElementById("stagePanel");
      if (!stage) return;
      const fields = (stage.fields || []).map(f => `
        <div class="field-row"><div class="fname">${f.label}</div><div>${f.value}</div></div>`).join("");
      const files = (stage.files || []).map(f => `
        <div class="file-item">
          <span>[${f.file_type_label || f.file_type}] ${f.file_name || f.file_url || ""}</span>
          ${f.download_status === "captcha_required"
            ? `<button class="linkish captchaBtn" data-file-id="${f.id}">验证码下载</button>`
            : `<label><input type="checkbox" class="fileBox" value="${f.id}"> 加入 ZIP</label>`}
        </div>`).join("");
      panel.innerHTML = `
        <h3>${stage.label}</h3>
        <div class="field-grid">${fields || "<div class='meta'>暂无字段</div>"}</div>
        ${stage.source_url ? `<p class="meta" style="margin-top:12px"><a href="${stage.source_url}" target="_blank">查看官网来源</a></p>` : ""}
        <div class="file-list">${files ? "<h4 style='margin:18px 0 8px'>附件</h4>" + files : ""}</div>`;
      panel.querySelectorAll(".captchaBtn").forEach(btn => {
        btn.addEventListener("click", () => openCaptcha(Number(btn.dataset.fileId)));
      });
      panel.querySelectorAll(".fileBox").forEach(box => {
        box.addEventListener("change", () => {
          if (box.checked) selectedFileIds.add(Number(box.value));
          else selectedFileIds.delete(Number(box.value));
          document.getElementById("downloadBtn").disabled = selectedFileIds.size === 0;
        });
      });
    }

    async function openCaptcha(fileId) {
      captchaState = { fileId, sessionId: null };
      document.getElementById("captchaMessage").textContent = "正在获取验证码…";
      document.getElementById("captchaInput").value = "";
      document.getElementById("captchaModal").classList.add("show");
      const res = await fetch("/api/download/e2/captcha", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ file_id: fileId }),
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById("captchaMessage").innerHTML = `<span class="error">${data.detail || "失败"}</span>`;
        return;
      }
      captchaState.sessionId = data.session_id;
      document.getElementById("captchaFileName").textContent = `${data.project_name} — ${data.file_name}`;
      document.getElementById("captchaImg").src = `data:${data.content_type};base64,${data.captcha_base64}`;
      document.getElementById("captchaMessage").textContent = "请输入图中验证码（与官网一致）";
    }

    async function submitCaptcha() {
      const captcha = document.getElementById("captchaInput").value.trim();
      if (!captcha) return;
      document.getElementById("captchaMessage").textContent = "正在下载…";
      const res = await fetch("/api/download/e2/file", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          file_id: captchaState.fileId,
          session_id: captchaState.sessionId,
          captcha,
        }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        document.getElementById("captchaMessage").innerHTML = `<span class="error">${data.detail || "下载失败"}</span>`;
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const disp = res.headers.get("Content-Disposition") || "";
      const m = disp.match(/filename="?([^";]+)"?/i);
      const a = document.createElement("a");
      a.href = url;
      a.download = m ? decodeURIComponent(m[1]) : "e2_attachment.pdf";
      a.click();
      URL.revokeObjectURL(url);
      document.getElementById("captchaMessage").textContent = "下载成功";
      setTimeout(() => document.getElementById("captchaModal").classList.remove("show"), 800);
    }

    async function refreshCaptchaImage() {
      if (!captchaState.sessionId) return;
      const res = await fetch(`/api/download/e2/refresh?session_id=${encodeURIComponent(captchaState.sessionId)}`, { method: "POST" });
      const data = await res.json();
      if (res.ok) {
        document.getElementById("captchaImg").src = `data:${data.content_type};base64,${data.captcha_base64}`;
        document.getElementById("captchaInput").value = "";
      }
    }

    async function startSync(fullSync, opts = {}) {
      document.getElementById("syncMessage").textContent = "提交同步任务…";
      const res = await fetch("/api/sync", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sources: opts.sources || ["link_sthj", "e2_qygk"],
          disclosure_types: opts.types || selectedTypes(),
          full_sync: fullSync,
          max_pages: 1,
          fetch_e2_details: true,
        }),
      });
      const data = await res.json();
      document.getElementById("syncMessage").textContent = res.ok ? data.message : (data.detail || "失败");
    }

    async function downloadZip() {
      const res = await fetch("/api/download/zip", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ file_ids: [...selectedFileIds] }),
      });
      if (!res.ok) { alert("下载失败"); return; }
      const blob = await res.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "sh_eia_files.zip";
      a.click();
    }

    document.getElementById("searchBtn").addEventListener("click", search);
    document.getElementById("query").addEventListener("keydown", e => { if (e.key === "Enter") search(); });
    document.querySelectorAll(".typeBox").forEach(b => b.addEventListener("change", search));
    document.getElementById("syncQuickBtn").addEventListener("click", () => startSync(false));
    document.getElementById("syncE2Btn").addEventListener("click", () => startSync(false, { sources: ["e2_qygk"], types: ["post_construction"] }));
    document.getElementById("syncFullBtn").addEventListener("click", () => { if (confirm("全量同步耗时较长，确定？")) startSync(true); });
    document.getElementById("refreshStatusBtn").addEventListener("click", refreshSyncStatus);
    document.getElementById("downloadBtn").addEventListener("click", downloadZip);
    document.getElementById("progressClose").addEventListener("click", () => document.getElementById("progressModal").classList.remove("show"));
    document.getElementById("captchaClose").addEventListener("click", () => document.getElementById("captchaModal").classList.remove("show"));
    document.getElementById("captchaSubmit").addEventListener("click", submitCaptcha);
    document.getElementById("captchaRefresh").addEventListener("click", refreshCaptchaImage);
    document.getElementById("captchaInput").addEventListener("keydown", e => { if (e.key === "Enter") submitCaptcha(); });
    document.getElementById("exportDbBtn").addEventListener("click", async () => {
      const res = await fetch("/api/database/export");
      const blob = await res.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "sh_eia_backup.zip";
      a.click();
    });
    document.getElementById("exportManifestBtn").addEventListener("click", async () => {
      const res = await fetch("/api/manifest?refresh=1");
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "sh_eia_manifest.json";
      a.click();
      document.getElementById("dbMessage").textContent =
        `数据清单已导出：${data.stats?.total_masters ?? 0} 个项目，${data.stats?.total_events ?? 0} 条事件，${data.stats?.total_files ?? 0} 个文件。`;
    });
    document.getElementById("importDbInput").addEventListener("change", async e => {
      const file = e.target.files?.[0];
      if (!file || !confirm(`导入 ${file.name}？`)) return;
      const form = new FormData();
      form.append("file", file);
      await fetch("/api/database/import", { method: "POST", body: form });
      await loadStats();
      await search();
    });

    loadStats();
    refreshSyncStatus();
    search();
  </script>
</body>
</html>
